name: 네이버 블로그 RSS 업데이트

on:
  workflow_dispatch:

  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

jobs:
  update-rss:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 불러오기
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 네이버 RSS 읽기
        run: python update_posts.py

      - name: 변경 내용 저장
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add posts.json

          if git diff --cached --quiet; then
            echo "새롭게 변경된 글이 없습니다."
          else
            git commit -m "네이버 블로그 최신 글 자동 업데이트"
            git push
          fi
